name: Build extension packages

on:
  pull_request:
  push:
  workflow_dispatch:

jobs:
  package:
    name: Validate and package extensions
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Firefox packaging tools
        run: npm install

      - name: Validate Firefox source
        run: npm run validate

      - name: Lint extension
        run: npm run lint

      - name: Build unsigned Firefox packages
        run: npm run package

      - name: Validate Chrome source
        working-directory: chrome-version
        run: npm run validate

      - name: Build Chrome package
        working-directory: chrome-version
        run: npm run package

      - name: Upload Firefox package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firefox-packages
          path: |
            dist/*.xpi
            dist/*.zip
          if-no-files-found: error

      - name: Upload Chrome package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: chrome-packages
          path: chrome-version/dist/*.zip
          if-no-files-found: error
